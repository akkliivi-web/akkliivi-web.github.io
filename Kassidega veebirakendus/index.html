<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cats in Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <h1>Cats in Cards</h1>
        <p class="subtitle">Cats with interesting breeds and temperaments</p>

        <section class="toolbar" aria-label="Controls">
            <button id="showCatsBtn" type="button">Show Other Cats</button>
            <button id="resetBtn" type="button" class="ghost-btn">Reset</button>
            <button id="themeBtn" type="button" class="ghost-btn">Toggle Theme</button>

            <input id="searchInput" type="search" placeholder="Search by breed..." aria-label="Search by breed">

            <select id="originFilter" aria-label="Filter by origin">
                <option value="all">All origins</option>
            </select>

            <select id="sortSelect" aria-label="Sort cards">
                <option value="random">Sort: Random</option>
                <option value="az">Sort: Breed A-Z</option>
                <option value="za">Sort: Breed Z-A</option>
            </select>

            <label class="favorites-toggle">
                <input id="favoritesOnly" type="checkbox">
                Favorites only
            </label>
        </section>

        <p id="cardsFound" class="cards-found">Cards found: 0</p>
        <section id="cards" class="cards" aria-label="Cat cards"></section>
    </main>

    <dialog id="catModal" class="cat-modal">
        <article class="modal-content">
            <button id="closeModalBtn" class="close-modal" type="button" aria-label="Close details">✕</button>
            <img id="modalImage" src="" alt="">
            <h2 id="modalBreed"></h2>
            <p id="modalOrigin"></p>
            <p id="modalTemperament"></p>
        </article>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
</body>
</html>
