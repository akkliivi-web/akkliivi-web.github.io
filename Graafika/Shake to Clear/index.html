<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shake to Clear</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, #0f172a, #1e293b);
      color: #e2e8f0;
      overflow-x: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .scene {
      width: min(960px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 50px);
    }

    .hint {
      margin: 0 0 26px;
      opacity: 0.9;
      font-size: 16px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .drop-item {
      border-radius: 16px;
      padding: 22px 16px;
      background: rgba(248, 250, 252, 0.95);
      color: #0f172a;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(2, 6, 23, 0.35);
      transform: translate3d(0, 0, 0);
      transition: transform 120ms ease;
      user-select: none;
      will-change: transform, opacity;
    }

    .drop-item:nth-child(2n) {
      background: rgba(191, 219, 254, 0.98);
    }

    .drop-item:nth-child(3n) {
      background: rgba(253, 224, 71, 0.96);
    }

    .drop-away {
      animation: dropAway 820ms cubic-bezier(0.2, 0.75, 0.2, 1) forwards;
    }

    @keyframes dropAway {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate3d(0, 130vh, 0) rotate(14deg) scale(0.85);
      }
    }
  </style>
</head>
<body>
  <main class="scene">
    <h1 class="drop-item">Shake to Clear</h1>
    <p class="hint drop-item">Liiguta hiirt kiiresti vasakule-paremale. Kui “shake” on piisavalt tugev, kukuvad kõik elemendid alla.</p>

    <section class="grid">
      <article class="drop-item">Element 1</article>
      <article class="drop-item">Element 2</article>
      <article class="drop-item">Element 3</article>
      <article class="drop-item">Element 4</article>
      <article class="drop-item">Element 5</article>
      <article class="drop-item">Element 6</article>
      <article class="drop-item">Element 7</article>
      <article class="drop-item">Element 8</article>
    </section>
  </main>

  <script>
    let lastX = null;
    let lastTime = 0;
    let lastDirection = 0;
    let shakeScore = 0;
    let cleared = false;

    function clearAllElements() {
      const items = document.querySelectorAll('.drop-item');
      items.forEach((item, index) => {
        setTimeout(() => {
          item.classList.add('drop-away');
        }, index * 45);
      });
    }

    function detectShakeToClear(event) {
      if (cleared) {
        return;
      }

      const now = performance.now();
      const x = event.clientX;

      if (lastX === null) {
        lastX = x;
        lastTime = now;
        return;
      }

      const dx = x - lastX;
      const dt = Math.max(now - lastTime, 1);
      const speed = Math.abs(dx) / dt;
      const direction = Math.sign(dx);

      if (Math.abs(dx) > 9 && speed > 0.9) {
        if (lastDirection !== 0 && direction !== 0 && direction !== lastDirection) {
          shakeScore += 1;
        } else {
          shakeScore = Math.max(0, shakeScore - 0.12);
        }

        lastDirection = direction;
      } else {
        shakeScore = Math.max(0, shakeScore - 0.08);
      }

      if (shakeScore >= 6) {
        cleared = true;
        clearAllElements();
        window.removeEventListener('mousemove', detectShakeToClear);
      }

      lastX = x;
      lastTime = now;
    }

    window.addEventListener('mousemove', detectShakeToClear);
  </script>
</body>
</html>
