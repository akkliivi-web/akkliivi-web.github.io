<!DOCTYPE html>
<html lang="et">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Magnetilised Nupud</title>
	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			min-height: 100%;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(160deg, #0f172a, #1e293b);
			color: #e2e8f0;
		}

		body {
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.wrapper {
			text-align: center;
			max-width: 840px;
			width: 100%;
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(28px, 4vw, 44px);
			letter-spacing: 0.4px;
		}

		p {
			margin: 0 0 36px;
			opacity: 0.9;
			font-size: 16px;
		}

		.buttons {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 20px;
		}

		.magnetic {
			border: none;
			border-radius: 14px;
			padding: 14px 24px;
			min-width: 150px;
			font-size: 16px;
			font-weight: 700;
			color: #0f172a;
			background: #f8fafc;
			cursor: pointer;
			transform: translate3d(0, 0, 0);
			transition: transform 120ms ease, box-shadow 120ms ease;
			box-shadow: 0 8px 24px rgba(2, 6, 23, 0.25);
		}

		.magnetic:hover {
			box-shadow: 0 12px 28px rgba(2, 6, 23, 0.35);
		}
	</style>
</head>
<body>
	<main class="wrapper">
		<h1>Magnetic Buttons</h1>
		<p>Kui kursor läheneb nupule, tõmbub nupp selle poole paari piksli võrra.</p>

		<div class="buttons">
			<button class="magnetic">Ava</button>
			<button class="magnetic">Salvesta</button>
			<button class="magnetic">Jaga</button>
			<button class="magnetic">Laadi alla</button>
		</div>
	</main>

	<script>
		function applyMagneticEffect(button, pointerX, pointerY) {
			const rect = button.getBoundingClientRect();
			const centerX = rect.left + rect.width / 2;
			const centerY = rect.top + rect.height / 2;

			const deltaX = pointerX - centerX;
			const deltaY = pointerY - centerY;
			const distance = Math.hypot(deltaX, deltaY);

			const triggerDistance = 140;
			const maxShift = 14;

			if (distance < triggerDistance) {
				const force = (triggerDistance - distance) / triggerDistance;
				const moveX = (deltaX / triggerDistance) * maxShift * force * 1.8;
				const moveY = (deltaY / triggerDistance) * maxShift * force * 1.8;
				button.style.transform = `translate3d(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px, 0)`;
			} else {
				button.style.transform = "translate3d(0, 0, 0)";
			}
		}

		const magneticButtons = document.querySelectorAll(".magnetic");

		window.addEventListener("mousemove", (event) => {
			magneticButtons.forEach((button) => {
				applyMagneticEffect(button, event.clientX, event.clientY);
			});
		});

		window.addEventListener("mouseleave", () => {
			magneticButtons.forEach((button) => {
				button.style.transform = "translate3d(0, 0, 0)";
			});
		});
	</script>
</body>
</html>
