<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Shadow Follow</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 18% 12%, #1f2f55, #0b1220 62%);
      color: #e2e8f0;
      overflow-x: hidden;
    }

    body {
      padding: 24px;
    }

    .title {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      padding: 10px 14px;
      line-height: 1.3;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(3px);
      z-index: 100;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .container {
      max-width: 920px;
    }

    h1,
    h2,
    h3 {
      margin: 20px 0;
      line-height: 1.2;
      letter-spacing: 0.2px;
      will-change: text-shadow;
    }

    h1 {
      font-size: clamp(40px, 6vw, 80px);
      text-shadow: 
        12px 12px 0px rgba(56, 189, 248, 0.6),
        24px 24px 0px rgba(167, 139, 250, 0.4),
        -6px -6px 0px rgba(52, 211, 153, 0.3);
    }

    h2 {
      font-size: clamp(32px, 4.5vw, 56px);
      color: #f472b6;
      text-shadow:
        10px 10px 0px rgba(244, 114, 182, 0.5),
        20px 20px 0px rgba(251, 191, 36, 0.35);
    }

    h3 {
      font-size: clamp(26px, 3.5vw, 42px);
      color: #34d399;
      text-shadow:
        8px 8px 0px rgba(52, 211, 153, 0.4),
        16px 16px 0px rgba(167, 139, 250, 0.3);
    }

    p {
      margin: 0 0 28px;
      opacity: 0.88;
      font-size: 16px;
      line-height: 1.5;
    }

    .arrow {
      margin-top: 32px;
      font-size: 24px;
      opacity: 0.7;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="title">Text Shadow Follow<br>Pealkirjade varjud jälgivad kursori vastassuunas.</div>

  <main class="stage">
    <div class="container">
      <h1 id="shadow1">Text Shadow</h1>
      <h2 id="shadow2">Follow Cursor</h2>
      <h3 id="shadow3">Opposite Direction</h3>
      <p>Liiguta hiirt — varjud pöörlevad alati kursori vastassuunas, justkui oleks päike kursori kohal.</p>
      <div class="arrow">↓</div>
    </div>
  </main>

  <script>
    const shadowElements = [
      { el: document.getElementById('shadow1'), distance: 16, blur: 8 },
      { el: document.getElementById('shadow2'), distance: 14, blur: 6 },
      { el: document.getElementById('shadow3'), distance: 12, blur: 5 }
    ];

    function updateShadows(mouseX, mouseY) {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      const deltaX = mouseX - centerX;
      const deltaY = mouseY - centerY;
      const angle = Math.atan2(deltaY, deltaX);
      const oppositeAngle = angle + Math.PI;

      shadowElements.forEach(({ el, distance, blur }) => {
        const shadowX = Math.cos(oppositeAngle) * distance;
        const shadowY = Math.sin(oppositeAngle) * distance;

        const shadowX2 = Math.cos(oppositeAngle + 0.4) * distance * 1.8;
        const shadowY2 = Math.sin(oppositeAngle + 0.4) * distance * 1.8;

        const shadowX3 = Math.cos(oppositeAngle - 0.35) * distance * 2.6;
        const shadowY3 = Math.sin(oppositeAngle - 0.35) * distance * 2.6;

        el.style.textShadow = `
          ${shadowX.toFixed(1)}px ${shadowY.toFixed(1)}px ${blur}px rgba(56, 189, 248, 0.6),
          ${shadowX2.toFixed(1)}px ${shadowY2.toFixed(1)}px ${Math.round(blur * 1.2)}px rgba(167, 139, 250, 0.4),
          ${shadowX3.toFixed(1)}px ${shadowY3.toFixed(1)}px ${Math.round(blur * 1.4)}px rgba(52, 211, 153, 0.3)
        `;
      });
    }

    let rafId = 0;

    window.addEventListener('mousemove', (event) => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        updateShadows(event.clientX, event.clientY);
      });
    });

    updateShadows(window.innerWidth / 2, window.innerHeight / 2);
  </script>
</body>
</html>
