<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Slap</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 25% 15%, #1f2a44, #0b1220 64%);
      color: #e2e8f0;
      overflow: hidden;
      user-select: none;
    }

    body {
      position: relative;
      cursor: pointer;
    }

    .hud {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      text-align: center;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.3;
      pointer-events: none;
      backdrop-filter: blur(3px);
    }

    .sticker {
      position: fixed;
      left: 0;
      top: 0;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%) rotate(var(--angle));
      pointer-events: none;
      filter: drop-shadow(0 8px 10px rgba(2, 6, 23, 0.35));
      animation: popIn 180ms ease-out;
      will-change: transform;
    }

    .sticker svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) scale(0.55);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="hud">Sticker Slap<br />Klõpsa ükskõik kuhu, et lisada juhuslik kleebis.</div>

  <script>
    const STICKERS = [
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="50" cy="50" r="46" fill="#facc15"/><circle cx="36" cy="40" r="6" fill="#0f172a"/><circle cx="64" cy="40" r="6" fill="#0f172a"/><path d="M30 63 Q50 80 70 63" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/></svg>`,
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="50,6 61,35 93,35 67,54 77,86 50,66 23,86 33,54 7,35 39,35" fill="#a78bfa" stroke="#f5f3ff" stroke-width="3"/></svg>`,
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="8" y="8" width="84" height="84" rx="20" fill="#22d3ee"/><path d="M32 54 L46 68 L72 36" stroke="#ecfeff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="50" cy="50" r="44" fill="#fb7185"/><path d="M50 24 L57 42 L76 42 L60 54 L66 74 L50 62 L34 74 L40 54 L24 42 L43 42 Z" fill="#fff1f2"/></svg>`,
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M50 8 C76 8 92 24 92 50 C92 76 76 92 50 92 C24 92 8 76 8 50 C8 24 24 8 50 8 Z" fill="#34d399"/><path d="M34 36 H66 V64 H34 Z" fill="#ecfdf5"/><circle cx="40" cy="44" r="3" fill="#10b981"/><circle cx="60" cy="44" r="3" fill="#10b981"/><path d="M38 56 Q50 65 62 56" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`
    ];

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function placeRandomSticker(x, y) {
      const sticker = document.createElement('div');
      const randomSticker = STICKERS[Math.floor(Math.random() * STICKERS.length)];
      const angle = `${randomInRange(-35, 35).toFixed(1)}deg`;
      const size = `${Math.round(randomInRange(72, 108))}px`;

      sticker.className = 'sticker';
      sticker.style.left = `${x}px`;
      sticker.style.top = `${y}px`;
      sticker.style.width = size;
      sticker.style.height = size;
      sticker.style.setProperty('--angle', angle);
      sticker.innerHTML = randomSticker;

      document.body.appendChild(sticker);
    }

    function handleStickerClick(event) {
      placeRandomSticker(event.clientX, event.clientY);
    }

    window.addEventListener('click', handleStickerClick);

    window.addEventListener('touchstart', (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      placeRandomSticker(touch.clientX, touch.clientY);
    }, { passive: true });
  </script>
</body>
</html>
