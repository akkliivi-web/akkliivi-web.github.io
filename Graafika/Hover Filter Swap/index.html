<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Filter Swap</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 18% 12%, #1f2f55, #0b1220 62%);
      color: #e2e8f0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(900px, 100%);
      text-align: center;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(3px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 44px);
    }

    p {
      margin: 0 0 20px;
      opacity: 0.9;
      line-height: 1.45;
    }

    .image-wrap {
      width: min(760px, 100%);
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 32px rgba(2, 6, 23, 0.4);
      cursor: pointer;
    }

    .photo {
      display: block;
      width: 100%;
      height: auto;
      filter: grayscale(100%) contrast(1.05);
      transform: scale(1);
      transition: filter 340ms ease, transform 340ms ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo.neon {
      filter: invert(1) hue-rotate(145deg) saturate(2.2) contrast(1.25) brightness(1.08);
      transform: scale(1.02);
    }

    .hint {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.78;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hover Filter Swap</h1>
    <p>Kui hiir pildile viia, vahetub filter must-valgest neoon/invert stiili vastu.</p>

    <figure class="image-wrap" id="imageWrap" aria-label="Filtriga pilt">
      <img
        id="hoverPhoto"
        class="photo"
        alt="Demo pilt"
        src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1400' height='840' viewBox='0 0 1400 840'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232c3e50'/%3E%3Cstop offset='100%25' stop-color='%234b79a1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1400' height='840' fill='url(%23bg)'/%3E%3Ccircle cx='280' cy='240' r='160' fill='rgba(255,255,255,0.12)'/%3E%3Ccircle cx='1080' cy='560' r='210' fill='rgba(255,255,255,0.1)'/%3E%3Cpath d='M0 640 C260 560 360 760 620 660 C860 570 960 760 1400 640 V840 H0 Z' fill='rgba(255,255,255,0.2)'/%3E%3Ctext x='700' y='350' font-size='110' text-anchor='middle' fill='rgba(255,255,255,0.94)' font-family='Arial,Helvetica,sans-serif' font-weight='700'%3EHOVER FILTER%3C/text%3E%3Ctext x='700' y='440' font-size='40' text-anchor='middle' fill='rgba(255,255,255,0.82)' font-family='Arial,Helvetica,sans-serif'%3EGrayscale %E2%86%92 Neon%3C/text%3E%3C/svg%3E"
      />
    </figure>

    <div class="hint">Liiguta hiirt pildi peale ja maha.</div>
  </main>

  <script>
    function bindHoverFilterSwap(container, imageElement) {
      function activateNeonFilter() {
        imageElement.classList.add('neon');
      }

      function resetDefaultFilter() {
        imageElement.classList.remove('neon');
      }

      container.addEventListener('mouseenter', activateNeonFilter);
      container.addEventListener('mouseleave', resetDefaultFilter);
      container.addEventListener('touchstart', activateNeonFilter, { passive: true });
      container.addEventListener('touchend', resetDefaultFilter);
      container.addEventListener('touchcancel', resetDefaultFilter);
    }

    const imageWrap = document.getElementById('imageWrap');
    const hoverPhoto = document.getElementById('hoverPhoto');
    bindHoverFilterSwap(imageWrap, hoverPhoto);
  </script>
</body>
</html>
