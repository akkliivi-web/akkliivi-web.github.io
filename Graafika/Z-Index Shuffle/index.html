<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Index Shuffle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 20% 15%, #1f2f55, #0b1220 62%);
      color: #e2e8f0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      padding: 10px 14px;
      line-height: 1.35;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(3px);
      z-index: 50;
    }

    .stage {
      position: relative;
      width: min(960px, 100%);
      height: 540px;
      background: rgba(15, 23, 42, 0.3);
      border: 2px dashed rgba(148, 163, 184, 0.35);
      border-radius: 18px;
      padding: 20px;
    }

    .card {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(2, 6, 23, 0.4);
      transition: transform 120ms ease, box-shadow 120ms ease;
      user-select: none;
    }

    .card:active {
      transform: scale(0.96);
    }

    .card.one {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #0f172a;
      left: 24px;
      top: 24px;
    }

    .card.two {
      background: linear-gradient(135deg, #f472b6, #ec4899);
      color: #0f172a;
      left: 180px;
      top: 160px;
    }

    .card.three {
      background: linear-gradient(135deg, #34d399, #10b981);
      color: #0f172a;
      right: 24px;
      top: 24px;
    }

    .card.four {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      right: 24px;
      bottom: 24px;
    }

    .card.five {
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
      color: #0f172a;
      left: 180px;
      bottom: 24px;
    }

    .z-label {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1px;
    }

    .hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(3px);
    }
  </style>
</head>
<body>
  <div class="panel">Z-Index Shuffle<br>Klõpsa elemendil, et tuua see esiplaanile.</div>

  <section class="stage" id="stage">
    <div class="card one" data-id="1">
      <span>Element 1</span>
      <span class="z-label">z: 1</span>
    </div>
    <div class="card two" data-id="2">
      <span>Element 2</span>
      <span class="z-label">z: 2</span>
    </div>
    <div class="card three" data-id="3">
      <span>Element 3</span>
      <span class="z-label">z: 3</span>
    </div>
    <div class="card four" data-id="4">
      <span>Element 4</span>
      <span class="z-label">z: 4</span>
    </div>
    <div class="card five" data-id="5">
      <span>Element 5</span>
      <span class="z-label">z: 5</span>
    </div>
  </section>

  <div class="hint">Klõps tõstab elemendi esiplaanile.</div>

  <script>
    function initializeZIndexShuffle() {
      const cards = document.querySelectorAll('.card');
      let maxZ = cards.length;

      function updateZIndices() {
        cards.forEach((card) => {
          const zLabel = card.querySelector('.z-label');
          const currentZ = parseInt(card.style.zIndex, 10) || 1;
          zLabel.textContent = `z: ${currentZ}`;
        });
      }

      cards.forEach((card) => {
        const id = parseInt(card.getAttribute('data-id'), 10);
        card.style.zIndex = String(id);

        card.addEventListener('click', (event) => {
          event.stopPropagation();
          maxZ += 1;
          card.style.zIndex = String(maxZ);
          updateZIndices();
        });
      });

      updateZIndices();
    }

    window.addEventListener('DOMContentLoaded', initializeZIndexShuffle);
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeZIndexShuffle);
    } else {
      initializeZIndexShuffle();
    }
  </script>
</body>
</html>
