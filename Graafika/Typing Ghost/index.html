<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Ghost</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 20% 15%, #1f2b4a, #0c1220 62%);
      color: #e2e8f0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(860px, 100%);
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 44px);
      text-align: center;
    }

    p {
      margin: 0 0 18px;
      opacity: 0.9;
      text-align: center;
      line-height: 1.45;
    }

    .input {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.72);
      color: #f8fafc;
      padding: 14px;
      font-size: 17px;
      outline: none;
    }

    .input:focus {
      border-color: rgba(56, 189, 248, 0.8);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .output {
      margin-top: 18px;
      min-height: 140px;
      border-radius: 12px;
      padding: 14px;
      background: rgba(2, 6, 23, 0.55);
      border: 1px dashed rgba(148, 163, 184, 0.35);
      font-size: 26px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ghost-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px);
      animation: riseIn 320ms ease forwards;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Typing Ghost</h1>
    <p>Sisesta teksti. Tähed ilmuvad väikese viivitusega ja sujuvalt altpoolt.</p>

    <textarea id="sourceInput" class="input" placeholder="Kirjuta siia..."></textarea>
    <div id="ghostOutput" class="output" aria-live="polite"></div>
    <div class="hint">Efekt uuendub iga sisestuse järel viivitusega.</div>
  </main>

  <script>
    const sourceInput = document.getElementById('sourceInput');
    const ghostOutput = document.getElementById('ghostOutput');

    let ghostTimer;

    function renderGhostText(text) {
      ghostOutput.textContent = '';

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < text.length; i++) {
        const span = document.createElement('span');
        span.className = 'ghost-char';
        span.style.animationDelay = `${i * 28}ms`;
        span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
        fragment.appendChild(span);
      }

      ghostOutput.appendChild(fragment);
    }

    function queueGhostTyping(text) {
      clearTimeout(ghostTimer);
      ghostTimer = setTimeout(() => {
        renderGhostText(text);
      }, 180);
    }

    sourceInput.addEventListener('input', (event) => {
      queueGhostTyping(event.target.value);
    });
  </script>
</body>
</html>
